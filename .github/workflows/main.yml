name: FakeStore CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Create Reports Directory
        run: mkdir -p qa/reports
      - name: Install dependencies
        run: |
          cd qa
          npm install
      - name: Run Postman Tests
        run: |
          cd qa
          npm test || true
      - name: Upload API Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-reports
          path: qa/reports/

  web-testing:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: |
          cd app
          npm install
      - name: Install Playwright Browsers
        run: |
          cd app
          npx playwright install --with-deps
      - name: Run Playwright tests
        run: |
          cd app
          npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 30
